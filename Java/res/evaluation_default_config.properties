  11175,69662,12213,98949,96055,50252,37809,26395,51435,77115

seeds.quick = 11111,22222,33333,44444,55555

# -- Suites ------------------------------------
# Each suite is one self-contained evaluation scenario.
# Suites run sequentially. Set suite.count to however many you want.
#
# -- Suite types -------------------------------
#   EXHAUSTIVE  ? every valid (total, AI-split) combination from 2 to 10 players,
#                 run once per seed
#   FIXED       ? one specific aiPlayers + randomPlayers configuration per seed
#
# -- Seeds -------------------------------------
#   suite.N.seeds = <group name>   ? references a named group defined above
#
# -- Rules -------------------------------------
#   8 comma-separated slots: true | false | random
#   random slots are re-rolled independently before each game
#   Default (if omitted): all false

suite.count = 3

# -- Suite 1 ? Baseline: no rules, full seed set --
suite.1.name  = Baseline
suite.1.type  = EXHAUSTIVE
suite.1.seeds = standard
suite.1.rules = false,false,false,false,false,false,false,false

# -- Suite 2 ? All rules enabled, full seed set ---
suite.2.name  = AllRules
suite.2.type  = EXHAUSTIVE
suite.2.seeds = standard
suite.2.rules = true,true,true,true,true,true,true,true

# -- Suite 3 ? Quick smoke test, fixed lineup -----
suite.3.name          = QuickFixed
suite.3.type          = FIXED
suite.3.seeds         = quick
suite.3.aiPlayers     = 3
suite.3.randomPlayers = 2
suite.3.rules         = false,false,random,false,true,random,false,false