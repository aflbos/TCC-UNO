# =====================================================================
# UNO AI Training Profile: 100 Million Steps (4-Player)
# Rules: false,false,false,false,false,false,true,false (Bluffing Only)
# =====================================================================

startPort=6000
numClients=32
phase.count=5

# =====================================================================
# PHASE 1: Bootstrapping (1 AI vs 3 Randoms)
# =====================================================================
# Kept small (500 games) because early games will likely hit the 3,000
# step timeout. 500 games per thread is enough for the AI to learn how
# to empty its hand and stop timing out.
phase.1.type=FIXED
phase.1.games=50
phase.1.aiPlayers=1
phase.1.heuristicPlayers=0
phase.1.randomPlayers=3
phase.1.rules=false,false,false,false,false,false,true,false

# =====================================================================
# PHASE 2: Advanced Bootstrapping (1 AI vs 3 Heuristics)
# =====================================================================
# The Heuristic AI actively tries to empty its hand and plays smartly.
# This phase forces the AI to learn basic winning strategies and defensive
# play against competent opponents before moving to pure self-play.
phase.2.type=FIXED
phase.2.games=100
phase.2.aiPlayers=1
phase.2.heuristicPlayers=3
phase.2.randomPlayers=0
phase.2.rules=false,false,false,false,false,false,true,false

# =====================================================================
# PHASE 3: Pure Self-Play (4 AIs) - The "Arms Race"
# =====================================================================
# By now, games should average ~50 steps.
# 5000 games gives the AIs a deep, uninterrupted chunk of time to figure
# out bluffing strategies against each other.
phase.3.type=FIXED
phase.3.games=500
phase.3.aiPlayers=4
phase.3.heuristicPlayers=0
phase.3.randomPlayers=0
phase.3.rules=false,false,false,false,false,false,true,false

# =====================================================================
# PHASE 4: Mixed (3 AIs vs 1 Heuristic) - The Benchmark
# =====================================================================
# 2000 games to ensure the AIs remain strictly better than the hardcoded
# heuristic baseline without forgetting how to exploit static logic.
phase.4.type=FIXED
phase.4.games=200
phase.4.aiPlayers=3
phase.4.heuristicPlayers=1
phase.4.randomPlayers=0
phase.4.rules=false,false,false,false,false,false,true,false

# =====================================================================
# PHASE 5: Diverse Table (2 AIs vs 1 Heuristic vs 1 Random) - Chaos
# =====================================================================
# 2000 games of high chaos. Forces the AI to deal with both unpredictable
# randomness and structured heuristic plays at the same table.
phase.5.type=FIXED
phase.5.games=200
phase.5.aiPlayers=2
phase.5.heuristicPlayers=1
phase.5.randomPlayers=1
phase.5.rules=false,false,false,false,false,false,true,false

# =====================================================================
# LOOPING CONFIGURATION
# =====================================================================
# Starts at Phase 3 to skip the initial bootstrap phases during loop
loop.infinite=true
loop.startPhase=3