# ---------------------------------------------
#  UNO Evaluation Schedule - COMPREHENSIVE
# ---------------------------------------------
#  Purpose: Fully characterise a trained model's
#  strength and identify weaknesses across all
#  meaningful axes:
#    - Rule set (none / all / random)
#    - Player count (exhaustive vs fixed spots)
#    - Table composition (AI-only vs mixed)
#
#  Suite summary:
#    Suite 1 - Baseline          : No rules, exhaustive player counts.
#                                  Measures raw card-play competence.
#    Suite 2 - AllRules          : All rules on, exhaustive counts.
#                                  Measures peak rule-aware performance.
#    Suite 3 - FullRandom        : All rules random, exhaustive counts.
#                                  Measures generalisation across rule sets.
#    Suite 4 - MixedPlayers_NoRules   : Fixed 3 AI + 2 random, no rules.
#                                       Isolates performance vs random opponents.
#    Suite 5 - MixedPlayers_AllRules  : Fixed 3 AI + 2 random, all rules on.
#                                       Hardest fixed-config test.
#    Suite 6 - QuickSmoke        : 5 seeds, fixed 3v2, partial random rules.
#                                  Fast sanity check during development.
# ---------------------------------------------

# Network
startPort  = 6000
numClients = 16

# -- Seed groups -----------------------------------------------

# Full seed bank (100 seeds) - used for all primary suites.
seeds.standard = \
  11111,22222,33333,44444,55555,66666,77777,88888,99999,12345,\
  67890,54321,98765,42000,69000,69696,42024,12321,32123,31415,\
  10000,20000,30000,40000,50000,60000,70000,80000,90000,10001,\
  60707,89695,58525,10622,31543,35549,56321,19240,59274,36426,\
  76598,49606,82368,22414,58797,72415,76191,81151,57500,43949,\
  20036,42430,70001,27677,91403,75311,62714,94579,83572,71394,\
  61335,87515,53758,34741,38213,93065,35096,10193,14895,15665,\
  62982,44989,73902,76905,22001,68582,33507,83073,15217,55102,\
  22107,84549,38930,61410,41207,73384,61175,10443,77781,17575,\
  11175,69662,12213,98949,96055,50252,37809,26395,51435,77115

# 5-seed set for the quick smoke test only.
seeds.quick = 11111,22222,33333,44444,55555

# -- Suites ----------------------------------------------------
suite.count = 6

# -- Suite 1 - Baseline: no rules, full seed set ---------------
# Exhaustive player-count sweep with all rules disabled.
# Use this as your primary "raw skill" benchmark.
# Compare win-rate by player count to spot size-specific weaknesses.
suite.1.name  = Baseline
suite.1.type  = EXHAUSTIVE
suite.1.seeds = standard
suite.1.rules = false,false,false,false,false,false,false,false

# -- Suite 2 - AllRules: every rule on, full seed set ----------
# Exhaustive sweep with every rule permanently enabled.
# Compare against Suite 1 to quantify the rule-handling penalty/bonus.
suite.2.name  = AllRules
suite.2.type  = EXHAUSTIVE
suite.2.seeds = standard
suite.2.rules = true,true,true,true,true,true,true,true

# -- Suite 3 - FullRandom: random rule mix, full seed set ------
# Exhaustive sweep where every rule is independently re-rolled per game.
# This is the primary "generalisation" benchmark - a strong score here
# indicates the model has truly internalised all rule variants.
suite.3.name  = FullRandom
suite.3.type  = EXHAUSTIVE
suite.3.seeds = standard
suite.3.rules = random,random,random,random,random,random,random,random

# -- Suite 4 - MixedPlayers, no rules --------------------------
# Fixed lineup: 3 AI agents + 2 random players, no rules.
# Isolates the model's ability to cope with random-policy opponents
# in a clean rule environment.
suite.4.name          = MixedPlayers_NoRules
suite.4.type          = FIXED
suite.4.seeds         = standard
suite.4.aiPlayers     = 3
suite.4.randomPlayers = 2
suite.4.rules         = false,false,false,false,false,false,false,false

# -- Suite 5 - MixedPlayers, all rules -------------------------
# Fixed lineup: 3 AI agents + 2 random players, all rules on.
# The hardest fixed-config test: maximum rule complexity combined with
# unpredictable opponents. Low scores here flag brittleness.
suite.5.name          = MixedPlayers_AllRules
suite.5.type          = FIXED
suite.5.seeds         = standard
suite.5.aiPlayers     = 3
suite.5.randomPlayers = 2
suite.5.rules         = true,true,true,true,true,true,true,true

# -- Suite 6 - QuickSmoke: fast dev-loop sanity check ----------
# Only 5 seeds, fixed 3v2 lineup, partial random rules.
# Runs in a fraction of the time of the other suites.
# Use during active development to confirm nothing has regressed
# before committing to a full evaluation run.
suite.6.name          = QuickSmoke
suite.6.type          = FIXED
suite.6.seeds         = quick
suite.6.aiPlayers     = 3
suite.6.randomPlayers = 2
suite.6.rules         = false,false,random,false,true,random,false,false
