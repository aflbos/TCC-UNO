# ---------------------------------------------
#  UNO ai.training.Training Routine Configuration
# ---------------------------------------------

# Network
startPort  = 5000
numClients = 16

# -- Loop control ---------------------------------------
# Phases numbered >= loop.startPhase repeat indefinitely when loop.infinite=true.
# Phases before loop.startPhase run only once.
loop.startPhase = 2
loop.infinite   = true

# -- Phases ---------------------------------------------
# Set phase.count to however many phases you want.
#
# -- Phase types ----------------------------------------
#   FIXED - fixed number of games, exact aiPlayers and randomPlayers amounts
#   RANDOM_AI - fixed number of games, AI player count drawn from [aiPlayersMin, aiPlayersMax]
#   MIXED - fixed number of games, both AI and random-player counts are randomized
#   EXHAUSTIVE - every valid (total, AI-split) combination from 2?10 players, repeated N times
#
# -- Rules ----------------------------------------------
# Each phase defines its own 8-slot rules array.
# Each slot is: true | false | random
#   true - rule is always enabled for every game in this phase
#   false - rule is always disabled for every game in this phase
#   random - rule is independently re-rolled before each game in this phase
# Example: rules = false,false,random,false,true,random,false,false
# Default (if omitted): all false

phase.count = 5

# -- Phase 1 - Warmup -----------------------------------
phase.1.type = FIXED
phase.1.games = 1
phase.1.aiPlayers = 4
phase.1.randomPlayers = 0
phase.1.rules = false,false,false,false,false,false,false,false

# -- Phase 2 - AI only, random player count -------------
phase.2.type = RANDOM_AI
phase.2.games = 1
phase.2.aiPlayersMin = 2
phase.2.aiPlayersMax = 10
phase.2.rules = false,false,false,false,false,false,false,false

# -- Phase 3 - Mixed, random counts + random rules ------
phase.3.type = MIXED
phase.3.games = 1
phase.3.aiPlayersMin = 1
phase.3.aiPlayersMax = 9
phase.3.rules = random,random,random,random,random,random,random,random

# -- Phase 4 - Exhaustive sweep, partial random rules ---
phase.4.type          = EXHAUSTIVE
phase.4.iterations    = 1
phase.4.rules         = false,false,random,false,true,random,false,false

# -- Phase 5 - Exhaustive, fully random rules -----------
phase.5.type          = EXHAUSTIVE
phase.5.iterations    = 1
phase.5.rules         = random,random,random,random,random,random,random,random