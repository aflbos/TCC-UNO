# ---------------------------------------------
#  UNO Training Schedule - GENERALIST
# ---------------------------------------------
#  Goal: Produce a model that plays well across
#  ALL rule combinations and ALL player counts.
#  Load this schedule after the FOUNDATION
#  schedule has converged, or use it standalone
#  for extended general-purpose training.
#
#  Curriculum outline:
#    Phase 1  (one-shot) : Rule-aware warmup.
#                          A short fixed block with all rules ON so
#                          the model is exposed to the full action space
#                          immediately before the loop begins.
#    -- loop starts at phase 2 --
#    Phase 2  (looping)  : RANDOM_AI, heavy random rules.
#                          Keeps player-count diversity high while
#                          randomising most rules each game.
#    Phase 3  (looping)  : MIXED counts, all rules random.
#                          Maximum variance - every axis (player count,
#                          AI vs random split, rule set) varies per game.
#    Phase 4  (looping)  : EXHAUSTIVE, partial rule randomisation.
#                          Ensures coverage of every player-count combo
#                          under a realistic mixed-rule environment.
#    Phase 5  (looping)  : EXHAUSTIVE, fully random rules.
#                          The hardest generalisation target: every
#                          combo of players AND every combo of rules.
# ---------------------------------------------

# Network
startPort  = 5000
numClients = 16

# Loop control
# Phase 1 runs once as a rule-aware warmup;
# phases 2-5 repeat indefinitely.
loop.startPhase = 2
loop.infinite   = true

phase.count = 5

# -- Phase 1 - Full-rules warmup (one-shot) -------------------------
# 200 games, 4 AI players, ALL rules enabled.
# Exposes the model to the widest action space upfront so it doesn't
# treat rule-card effects as out-of-distribution surprises later.
phase.1.type          = FIXED
phase.1.games         = 200
phase.1.aiPlayers     = 4
phase.1.randomPlayers = 0
phase.1.rules         = true,true,true,true,true,true,true,true

# -- Phase 2 - Random AI count + heavy rule randomisation -----------
# 600 games per cycle. Player count varies across [2, 10].
# 6 of 8 rule slots are randomised; 2 are pinned true to ensure
# some rules are reliably present every game.
phase.2.type         = RANDOM_AI
phase.2.games        = 600
phase.2.aiPlayersMin = 2
phase.2.aiPlayersMax = 10
phase.2.rules        = true,random,random,random,true,random,random,random

# -- Phase 3 - Maximum variance: mixed counts + all random rules ----
# 600 games per cycle. Both AI count and random-player count vary,
# AND every rule slot is independently re-rolled each game.
# This is the highest-entropy phase and the primary driver of
# broad generalisation.
phase.3.type          = MIXED
phase.3.games         = 600
phase.3.aiPlayersMin  = 1
phase.3.aiPlayersMax  = 9
phase.3.rules         = random,random,random,random,random,random,random,random

# -- Phase 4 - Exhaustive player sweep, realistic rule mix ----------
# Every legal (total, AI-split) combination, 2 iterations per cycle.
# Rule slots mirror a typical house-rules game: two rules are fixed on,
# two are fixed off, and four are randomised. Gives the model a
# structured rule environment while still varying player count fully.
phase.4.type       = EXHAUSTIVE
phase.4.iterations = 2
phase.4.rules      = true,false,random,false,true,random,random,false

# -- Phase 5 - Exhaustive sweep + fully random rules ----------------
# Every legal player-count combination AND every rule re-rolled per game.
# The most comprehensive generalisation phase. Runs 2 iterations per cycle
# to balance coverage against wall-clock time.
phase.5.type       = EXHAUSTIVE
phase.5.iterations = 2
phase.5.rules      = random,random,random,random,random,random,random,random
